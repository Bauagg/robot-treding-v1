# Alembic configuration file

[alembic]
# Path ke folder migration scripts
script_location = alembic

# Tambahkan current directory ke sys.path
prepend_sys_path = .

# Separator untuk version_locations (pakai os.pathsep)
version_path_separator = os

# URL diambil dari .env via env.py — tidak perlu diisi di sini
sqlalchemy.url =


# ─── Logging ──────────────────────────────────────────────────────────────────

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
